apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runtime-manager.fullname" . }}
  labels:
    {{- include "runtime-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "runtime-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "runtime-manager.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: runtime-manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP